<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Pinkjulieju Store</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink-main: #ffb7c5; /* ชมพูอ่อนหลัก */
    --pink-soft: #ffe4e8; /* ชมพูพาสเทล */
    --pink-deep: #ff85a1; /* ชมพูเข้มดึงสายตา */
    --yellow-star: #fff9c4; /* เหลืองดาว */
    --white: #ffffff;
    --text: #4a4a4a;
    --text-light: #9b7a87;
    --shadow: 0 4px 20px rgba(255,183,197,0.25);
    --shadow-hover: 0 8px 32px rgba(255,183,197,0.4);
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Kanit', sans-serif;
    background: linear-gradient(135deg, #ffffff 0%, #fff0f3 50%, #fff9e6 100%);
    min-height: 100vh;
    color: var(--text);
  }

  /* Star Decoration Background */
  body::before { content: "⭐"; position: fixed; top: 10%; left: 5%; font-size: 1.2rem; opacity: 0.3; z-index: -1; }
  body::after { content: "✨"; position: fixed; bottom: 15%; right: 8%; font-size: 1.5rem; opacity: 0.3; z-index: -1; }

  /* HEADER */
  header {
    background: var(--white);
    padding: 20px;
    text-align: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: var(--shadow);
    border-bottom: 2px solid var(--pink-soft);
  }
  header h1 { font-size: 1.7rem; font-weight: 700; color: var(--pink-deep); text-shadow: 1px 1px 2px rgba(0,0,0,0.05); }
  header p { color: var(--text-light); font-size: 0.85rem; margin-top: 4px; }

  /* NAV TABS */
  .tabs { display: flex; gap: 8px; padding: 15px; overflow-x: auto; scrollbar-width: none; background: rgba(255,255,255,0.5); }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 10px 22px; border-radius: 25px; border: 2px solid var(--pink-soft);
    background: white; color: var(--pink-deep); font-size: 0.88rem; font-weight: 500;
    cursor: pointer; white-space: nowrap; transition: all 0.25s;
  }
  .tab-btn.active, .tab-btn:hover {
    background: var(--pink-main); color: white; border-color: var(--pink-main);
    box-shadow: 0 4px 12px rgba(255,183,197,0.4);
  }

  /* MAIN CONTENT */
  main { padding: 15px; max-width: 750px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }
  .section-title { font-size: 1.1rem; font-weight: 600; margin: 15px 0 10px; display: flex; align-items: center; gap: 8px; color: var(--pink-deep); }

  /* PRODUCT CARD */
  .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .product-card {
    background: var(--white); border-radius: 20px; border: 1.5px solid var(--pink-soft);
    padding: 15px; cursor: pointer; transition: all 0.3s; box-shadow: var(--shadow);
    position: relative; overflow: hidden; text-align: center;
  }
  .product-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: var(--pink-main); }
  
  .app-icon {
    width: 55px; height: 55px; border-radius: 14px; background: #e50914; /* Netflix Red */
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; font-weight: bold; color: white; margin: 0 auto 10px;
    box-shadow: 0 4px 10px rgba(229, 9, 20, 0.2);
  }
  .product-name { font-size: 0.85rem; font-weight: 600; line-height: 1.4; min-height: 2.8em; margin-bottom: 8px; }
  .product-price { font-size: 1.25rem; font-weight: 700; color: var(--pink-deep); margin-bottom: 10px; }
  
  .btn-buy {
    width: 100%; padding: 10px; border-radius: 20px; border: none;
    background: linear-gradient(135deg, var(--pink-main), var(--pink-deep));
    color: white; font-weight: 600; cursor: pointer; transition: 0.2s;
  }
  .btn-buy:disabled { background: #ddd; cursor: not-allowed; }
  
  .stock-badge { font-size: 0.75rem; color: var(--text-light); margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 4px; }
  .stock-dot { width: 8px; height: 8px; border-radius: 50%; background: #80ed99; }
  .stock-dot.out { background: #ff6b6b; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(61,44,53,0.5);
    z-index: 200; display: none; align-items: flex-end; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 30px 30px 0 0; padding: 25px 20px 40px;
    width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  /* QR & SLIP AREA (DO NOT CUT) */
  .qr-box {
    background: var(--pink-soft); border: 2px dashed var(--pink-main);
    border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 15px;
  }
  .qr-img { width: 160px; height: 160px; margin: 0 auto 10px; background: white; border-radius: 12px; padding: 5px; }
  .qr-img img { width: 100%; height: 100%; object-fit: cover; }
  
  .verify-box { border-radius: 15px; padding: 15px; margin-bottom: 15px; text-align: center; display: none; }
  .verify-box.success { background: #d4f8e0; border: 2px solid #80ed99; display: block; }
  .verify-box.fail { background: #ffe0e6; border: 2px solid #ff85a1; display: block; }
  
  .code-display { font-size: 1.2rem; font-weight: 700; background: white; padding: 12px; border-radius: 12px; margin: 10px 0; border: 2px solid #80ed99; }

  /* ADMIN PANEL STYLES */
  .admin-card { background: white; border-radius: 20px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 15px; }
  .form-group { margin-bottom: 15px; }
  .form-group label { font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid var(--pink-soft); font-family: 'Kanit';
  }
  
  /* UTILS */
  .btn-main { width: 100%; padding: 14px; border-radius: 20px; border: none; background: var(--pink-deep); color: white; font-weight: 600; cursor: pointer; }
  .float-contact { position: fixed; bottom: 20px; right: 20px; z-index: 50; display: flex; flex-direction: column; gap: 10px; }
  .float-btn { width: 50px; height: 50px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; box-shadow: var(--shadow); cursor: pointer; }
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 25px; border-radius: 25px; font-size: 0.85rem; opacity: 0; transition: 0.3s; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>🌸 Pinkjulieju Store</h1>
  <p>Streaming Premium • ระบบส่งอัตโนมัติ 24 ชม. ✨</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('netflix')">🎬 Netflix</button>
  <button class="tab-btn" onclick="switchTab('orders')">📋 ออเดอร์ของฉัน</button>
</div>

<main>
  <div class="section active" id="tab-netflix">
    <div class="section-title">⭐ Netflix Premium</div>
    <div class="product-grid" id="grid-netflix"></div>
  </div>

  <div class="section" id="tab-orders">
    <div class="section-title">📦 ประวัติการซื้อของคุณ</div>
    <div id="orders-list"></div>
  </div>

  <div class="section" id="tab-admin">
    <div class="admin-card" id="admin-login-form">
      <h2 style="text-align:center; margin-bottom:15px">🔐 Admin Login</h2>
      <div class="form-group">
        <input type="password" id="admin-pass-input" placeholder="รหัสผ่านแอดมิน">
      </div>
      <button class="btn-main" onclick="adminLogin()">เข้าสู่ระบบ</button>
    </div>

    <div id="admin-dashboard" style="display:none">
      <div class="admin-card">
        <h3>➕ เพิ่มสต็อกสินค้า</h3>
        <div class="form-group">
          <select id="admin-product-select"></select>
        </div>
        <div class="form-group">
          <textarea id="admin-codes-input" placeholder="ใส่รหัส (1 บรรทัดต่อ 1 รหัส)"></textarea>
        </div>
        <button class="btn-main" onclick="adminAddCodes()">✅ เพิ่มเข้าสต็อก</button>
      </div>
      <div id="admin-stock-table"></div>
      <button class="btn-main" style="background:#ff6b6b; margin-top:15px" onclick="adminLogout()">🚪 ออกจากระบบ</button>
    </div>
  </div>
</main>

<div class="modal-overlay" id="order-modal">
  <div class="modal">
    <h2 id="modal-title" style="color:var(--pink-deep); margin-bottom:10px"></h2>
    <div class="qr-box">
      <div class="qr-img" id="qr-display"></div>
      <p>พร้อมเพย์: <strong id="display-promptpay"></strong></p>
      <div style="background:white; border-radius:10px; padding:5px; margin-top:5px; font-size:0.9rem" id="display-accname"></div>
    </div>
    
    <div id="slip-preview-wrap">
      <img id="slip-preview-img" style="width:100%; border-radius:15px; margin-bottom:15px; display:none">
    </div>

    <button class="btn-main" style="background:var(--pink-soft); color:var(--pink-deep); margin-bottom:10px" onclick="document.getElementById('slip-file').click()">
      📸 อัปโหลดสลิปที่นี่
    </button>
    <input type="file" id="slip-file" accept="image/*" onchange="handleSlipUpload(event)" style="display:none">

    <div class="verify-box" id="verify-result"></div>
    <button class="btn-main" id="btn-verify" onclick="verifySlip()" disabled>🔍 ตรวจสอบสลิปและรับรหัส</button>
    <button class="btn-main" style="background:none; color:#999" onclick="closeModal()">ปิดหน้าต่าง</button>
  </div>
</div>

<div class="float-contact">
  <button class="float-btn" style="background:var(--pink-soft)" onclick="toggleAdminTab()">⚙️</button>
  <button class="float-btn" style="background:#06c755; color:white" onclick="openLine()">💬</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// DATA & LOGIC (EVERYTHING IS HERE)
// ============================================================
const STORE_KEY = 'pinkjulieju_store_data';

function loadData() {
  const d = localStorage.getItem(STORE_KEY);
  return d ? JSON.parse(d) : null;
}

function saveData(data) {
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}

function initData() {
  const existing = loadData();
  if (existing) return existing;
  return {
    settings: { promptpay: '0812345678', accname: 'Pinkjulieju Store', lineId: '@pinkjulieju', adminPass: 'admin1234' },
    products: [
      { id: 'nf_m_1', name: 'Netflix มือถือ/คอม (1 Day)', type: 'netflix', price: 16, codes: [] },
      { id: 'nf_m_7', name: 'Netflix มือถือ/คอม (7 Days)', type: 'netflix', price: 46, codes: [] },
      { id: 'nf_m_30', name: 'Netflix มือถือ/คอม (30 Days)', type: 'netflix', price: 120, codes: [] },
      { id: 'nf_tv_1', name: 'Netflix ทีวี (1 Day)', type: 'netflix', price: 26, codes: [] },
      { id: 'nf_tv_7', name: 'Netflix ทีวี (7 Days)', type: 'netflix', price: 69, codes: [] },
      { id: 'nf_tv_30', name: 'Netflix ทีวี (30 Days)', type: 'netflix', price: 219, codes: [] },
      { id: 'nf_mc_1', name: 'Netflix มือถือ/คอม ปิดเคลม (1 Day)', type: 'netflix', price: 26, codes: [] },
      { id: 'nf_mc_7', name: 'Netflix มือถือ/คอม ปิดเคลม (7 Days)', type: 'netflix', price: 55, codes: [] },
      { id: 'nf_mc_30', name: 'Netflix มือถือ/คอม ปิดเคลม (30 Days)', type: 'netflix', price: 125, codes: [] },
      { id: 'nf_tvc_1', name: 'Netflix ทีวี ปิดเคลม (1 Day)', type: 'netflix', price: 33, codes: [] },
      { id: 'nf_tvc_7', name: 'Netflix ทีวี ปิดเคลม (7 Days)', type: 'netflix', price: 74, codes: [] },
      { id: 'nf_tvc_30', name: 'Netflix ทีวี ปิดเคลม (30 Days)', type: 'netflix', price: 225, codes: [] }
    ],
    orders: [],
    verifiedSlips: []
  };
}

let DB = initData();
let currentProduct = null;
let uploadedSlipBase64 = null;

// RENDER PRODUCTS
function renderProducts() {
  const grid = document.getElementById('grid-netflix');
  grid.innerHTML = DB.products.map(p => {
    const stock = p.codes.length;
    return `
      <div class="product-card">
        <div class="app-icon">N</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">${p.price}฿</div>
        <button class="btn-buy" ${stock === 0 ? 'disabled' : ''} onclick="openOrder('${p.id}')">
          ${stock === 0 ? 'หมดแล้ว' : 'สั่งซื้อ 🛒'}
        </button>
        <div class="stock-badge">
          <span class="stock-dot ${stock === 0 ? 'out' : ''}"></span>
          คงเหลือ ${stock} ชิ้น
        </div>
      </div>`;
  }).join('');
}

// TABS
function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if(event) event.target.classList.add('active');
}

function toggleAdminTab() {
  switchTab('admin');
}

// MODAL & ORDER
function openOrder(id) {
  currentProduct = DB.products.find(p => p.id === id);
  document.getElementById('modal-title').innerText = currentProduct.name;
  document.getElementById('display-promptpay').innerText = DB.settings.promptpay;
  document.getElementById('display-accname').innerText = DB.settings.accname;
  document.getElementById('qr-display').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=promptpay:${DB.settings.promptpay}">`;
  document.getElementById('order-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('order-modal').classList.remove('open');
  uploadedSlipBase64 = null;
  document.getElementById('slip-preview-img').style.display = 'none';
  document.getElementById('verify-result').style.display = 'none';
}

function handleSlipUpload(e) {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(ev) {
    uploadedSlipBase64 = ev.target.result;
    document.getElementById('slip-preview-img').src = uploadedSlipBase64;
    document.getElementById('slip-preview-img').style.display = 'block';
    document.getElementById('btn-verify').disabled = false;
  };
  reader.readAsDataURL(file);
}

// SLIP VERIFICATION (API SLIPOKKY7INAI - DO NOT REMOVE)
async function verifySlip() {
  const btn = document.getElementById('btn-verify');
  const resultBox = document.getElementById('verify-result');
  btn.innerText = '⏳ กำลังตรวจสอบ...';
  btn.disabled = true;

  try {
    // จำลองการตรวจสอบ (คุณสามารถเชื่อมต่อ API จริงในส่วนนี้)
    // สำหรับตัวอย่างนี้ จะให้ผ่านถ้ามีการอัปโหลดภาพ
    setTimeout(() => {
      if (currentProduct.codes.length > 0) {
        const deliveredCode = currentProduct.codes.shift();
        const order = { name: currentProduct.name, code: deliveredCode, date: new Date().toLocaleString(), price: currentProduct.price };
        DB.orders.unshift(order);
        saveData(DB);
        
        resultBox.className = 'verify-box success';
        resultBox.innerHTML = `✅ ชำระเงินเรียบร้อย!<br><div class="code-display">${deliveredCode}</div><small>คัดลอกรหัสไปใช้งานได้เลยค่ะ</small>`;
        renderProducts();
        renderOrders();
      } else {
        throw new Error('ขออภัยค่ะ สินค้าหมดสต็อกกะทันหัน');
      }
      btn.innerText = '🔍 ตรวจสอบสลิปและรับรหัส';
    }, 2000);
  } catch (err) {
    resultBox.className = 'verify-box fail';
    resultBox.innerText = err.message;
    btn.disabled = false;
  }
}

function renderOrders() {
  const list = document.getElementById('orders-list');
  list.innerHTML = DB.orders.length ? DB.orders.map(o => `
    <div class="admin-card">
      <strong>${o.name}</strong><br>
      <code style="color:var(--pink-deep)">${o.code}</code><br>
      <small>${o.date} | ${o.price}฿</small>
    </div>`).join('') : '<p style="text-align:center">ยังไม่มีประวัติการซื้อ</p>';
}

// ADMIN FUNCTIONS
function adminLogin() {
  if (document.getElementById('admin-pass-input').value === DB.settings.adminPass) {
    document.getElementById('admin-login-form').style.display = 'none';
    document.getElementById('admin-dashboard').style.display = 'block';
    renderAdminDashboard();
  } else { showToast('รหัสผ่านไม่ถูกต้อง'); }
}

function renderAdminDashboard() {
  const sel = document.getElementById('admin-product-select');
  sel.innerHTML = DB.products.map(p => `<option value="${p.id}">${p.name} (${p.codes.length})</option>`).join('');
}

function adminAddCodes() {
  const id = document.getElementById('admin-product-select').value;
  const codes = document.getElementById('admin-codes-input').value.split('\n').filter(c => c.trim());
  const p = DB.products.find(x => x.id === id);
  p.codes.push(...codes);
  saveData(DB);
  showToast('เพิ่มสต็อกเรียบร้อย!');
  document.getElementById('admin-codes-input').value = '';
  renderProducts();
  renderAdminDashboard();
}

function adminLogout() {
  document.getElementById('admin-login-form').style.display = 'block';
  document.getElementById('admin-dashboard').style.display = 'none';
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.innerText = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function openLine() { window.open('https://line.me/ti/p/~' + DB.settings.lineId.replace('@','')); }

// INIT
renderProducts();
renderOrders();
</script>

</body>
</html>
